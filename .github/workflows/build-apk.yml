name: Build Android APK

on:
  push:
    branches: [ main, master, release/** ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with Rust JNI
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CARGO_HTTP_MULTIPLEXING: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK and NDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        rm cmdline-tools.zip
        
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
        
    - name: Show NDK structure
      run: |
        ls -la $ANDROID_NDK_HOME/
        ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
        
    - name: Cache Rust cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: jni -> target
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Rust JNI Libraries
      run: |
        cd jni
        
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        export NDK_HOME=$ANDROID_NDK_HOME
        export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        
        echo "Building with NDK: $ANDROID_NDK_HOME"
        echo "Contents: $(ls $ANDROID_NDK_HOME)"
        which aarch64-linux-android-clang || echo "clang not found"
        
        cargo build --release --lib --target-dir ./target 2>&1 || {
          echo "First build failed, trying again..."
          cargo build --release --lib 2>&1
        }
        
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        mkdir -p ../app/src/main/jniLibs/x86_64
        mkdir -p ../app/src/main/jniLibs/x86
        
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "No arm64 library"
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || echo "No armv7 library"
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/x86_64/ 2>/dev/null || echo "No x86_64 library"
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/x86/ 2>/dev/null || echo "No x86 library"
        
        ls -la ../app/src/main/jniLibs/
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PCAPReceiver-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
