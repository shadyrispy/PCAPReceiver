name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: 35.0.0
        
    - name: Setup Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26d" 2>/dev/null || true
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
        
    - name: Cache Rust cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: jni -> target
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Rust JNI Libraries
      run: |
        cd jni
        NDK_VERSION=$(ls $ANDROID_HOME/ndk 2>/dev/null | head -1 || echo "26d")
        echo "Building with NDK: $NDK_VERSION"
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION
        cargo build --release --lib
        
        mkdir -p ../app/src/main/jniLibs/arm64-v8a
        mkdir -p ../app/src/main/jniLibs/armeabi-v7a
        mkdir -p ../app/src/main/jniLibs/x86_64
        mkdir -p ../app/src/main/jniLibs/x86
        
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/arm64-v8a/
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/armeabi-v7a/
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/x86_64/
        cp target/release/libartifactarium.so ../app/src/main/jniLibs/x86/
        
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Create Release
      run: |
        RELEASE_NOTES="## Features
- Capture only com.miHoYo.Yuanshen traffic using app_filter
- Filter UDP packets on ports 22101 and 22102
- Parse game packets using auto-artifactarium via JNI
- Display JNI call and return status in logs

## Build Info
- APK built with Rust JNI library for packet parsing
- Supports arm64-v8a, armeabi-v7a, x86_64, x86"

        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/releases \
          -d "{\"tag_name\":\"${{ github.ref_name }}\",\"name\":\"${{ github.ref_name }}\",\"body\":\"$RELEASE_NOTES\",\"draft\":false,\"prerelease\":false}"
          
    - name: Upload Release APK
      run: |
        # Get the latest release upload URL
        UPLOAD_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.upload_url')
        
        # Upload the APK
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary @app/build/outputs/apk/release/app-release.apk \
          "${UPLOAD_URL%\{*}"?name=PCAPReceiver-${{ github.ref_name }}.apk
